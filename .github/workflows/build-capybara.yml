name: Build Capybara Kernel

env:
  CLANG_VERSION: clang-r596125
  CLANG_BRANCH: android17-release

on:
  workflow_dispatch:
    inputs:
      enable_susfs:
        description: "Enable SUSFS (hide root traces)"
        type: boolean
        default: true
      ksu_branch:
        description: "ReSukiSU branch (leave empty = main)"
        type: string
        default: "main"
      version:
        description: "Custom version name (optional)"
        type: string
        default: ""

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

jobs:
  build:
    name: capybara-${{ inputs.enable_susfs == true && 'susfs' || 'clean' }}
    runs-on: ubuntu-26.04
    timeout-minutes: 120

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0

      - name: Fast cleanup + swap
        run: |
          # Quick disk cleanup
          sudo rm -rf /usr/share/dotnet /usr/local/share/powershell /opt/hostedtoolcache/go
          sudo apt-get remove -y -qq 2>/dev/null \
            dotnet* aspnetcore* netstandard* || true
          df -h /

          # Disable existing swap and create fresh 10GB swap
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /mnt/swapfile 2>/dev/null || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=10240 status=progress
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            ccache flex bison libncurses-dev libssl-dev libelf-dev \
            cpio wget curl jq git zip unzip bc \
            gcc g++ make device-tree-compiler python3

      - name: Cache Clang toolchain
        id: cache-clang
        uses: actions/cache@v6
        with:
          path: clang-${{ env.CLANG_VERSION }}
          key: clang-${{ env.CLANG_VERSION }}-${{ runner.os }}

      - name: Download Clang ${{ env.CLANG_VERSION }}
        if: steps.cache-clang.outputs.cache-hit != 'true'
        run: |
          mkdir -p clang-${{ env.CLANG_VERSION }}
          curl -fLSs \
            "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/${{ env.CLANG_BRANCH }}/${{ env.CLANG_VERSION }}.tar.gz" \
            | tar -xz -C clang-${{ env.CLANG_VERSION }}/

      - name: Setup Clang and ccache
        run: |
          chmod +x clang-${{ env.CLANG_VERSION }}/bin/clang
          echo "$PWD/clang-${{ env.CLANG_VERSION }}/bin" >> $GITHUB_PATH
          echo "CLANG_PATH=$PWD/clang-${{ env.CLANG_VERSION }}/bin" >> $GITHUB_ENV
          $PWD/clang-${{ env.CLANG_VERSION }}/bin/clang --version | head -2

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: capybara-${{ github.sha }}
          max-size: 3G

      - name: Apply ReSukiSU
        run: |
          KSU_BRANCH="${{ inputs.ksu_branch != '' && inputs.ksu_branch || 'main' }}"
          echo "Applying ReSukiSU (branch: $KSU_BRANCH)..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" \
            | bash -s -- "$KSU_BRANCH"
          [ -d "KernelSU" ] && echo "ReSukiSU integration successful."

      - name: Apply SUSFS patches
        if: inputs.enable_susfs
        run: |
          echo "Applying SUSFS patches..."
          git clone https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-android15-6.6 --depth 1 susfs4ksu

          if [ -f ".github/actions/fixup_susfs.sh" ]; then
            bash .github/actions/fixup_susfs.sh .
          fi

          SUSFS_PATCH="susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch"
          if [ -f "$SUSFS_PATCH" ]; then
            patch -p1 --forward < "$SUSFS_PATCH" || true
          fi

          cp -v susfs4ksu/kernel_patches/include/linux/* include/linux/ 2>/dev/null || true
          cp -v susfs4ksu/kernel_patches/fs/* fs/ 2>/dev/null || true

      - name: Configure kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64

          # Apply config overrides before make defconfig
          # HZ_300 for smoother UI
          sed -i 's/CONFIG_HZ_250=y/# CONFIG_HZ_250 is not set/' arch/arm64/configs/capybara_defconfig
          sed -i 's/# CONFIG_HZ_300 is not set/CONFIG_HZ_300=y/' arch/arm64/configs/capybara_defconfig

          # ThinLTO for better performance
          sed -i 's/CONFIG_LTO_NONE=y/# CONFIG_LTO_NONE is not set/' arch/arm64/configs/capybara_defconfig
          sed -i 's/# CONFIG_LTO_CLANG_THIN is not set/CONFIG_LTO_CLANG_THIN=y/' arch/arm64/configs/capybara_defconfig

          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            {
              echo ""
              echo "# ReSukiSU + SUSFS"
              echo "CONFIG_KSU=y"
              echo "CONFIG_KSU_SUSFS=y"
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y"
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y"
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_KSU_DENYLIST=y"
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y"
              echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y"
            } >> arch/arm64/configs/capybara_defconfig
          fi

          grep -q "CONFIG_BBG=y" arch/arm64/configs/capybara_defconfig || \
            echo "CONFIG_BBG=y" >> arch/arm64/configs/capybara_defconfig

          make O=out CC=clang LLVM=1 LLVM_IAS=1 KCFLAGS="-w" capybara_defconfig

          # AutoFDO: download pre-built GKI profile and enable PGO
          AFDO_PROFILE="$PWD/afdo_profile/kernel.afdo"
          mkdir -p afdo_profile
          curl -fLSs \
            "https://android.googlesource.com/kernel/common/+archive/refs/heads/android15-6.6/android/gki/aarch64/afdo.tar.gz" \
            | tar -xz -C afdo_profile/
          if [ -f "$AFDO_PROFILE" ]; then
            scripts/config --file out/.config -e CONFIG_AUTOFDO_CLANG
            echo "CONFIG_AUTOFDO_CLANG=y ✓ (profile: $(du -h "$AFDO_PROFILE" | cut -f1))"
          else
            echo "⚠ AutoFDO profile not found, skipping"
          fi

          # Reduce debug overhead (ABI-verified)
          scripts/config --file out/.config \
            -e CONFIG_DEBUG_INFO_REDUCED \
            -d CONFIG_DEBUG_MISC \
            -d CONFIG_BT_DEBUGFS \
            -d CONFIG_DEBUG_MEMORY_INIT \
            -d CONFIG_PROFILING \
            -d CONFIG_PRINTK_CALLER \
            -d CONFIG_RCU_TRACE \
            -d CONFIG_CMA_DEBUGFS \
            -d CONFIG_UBSAN \
            -d CONFIG_UBSAN_BOUNDS \
            -d CONFIG_UBSAN_ARRAY_BOUNDS \
            -d CONFIG_UBSAN_LOCAL_BOUNDS \
            -d CONFIG_UBSAN_SANITIZE_ALL \
            -d CONFIG_UBSAN_TRAP \
            -d CONFIG_CLEANCACHE \
            -d CONFIG_PRINTK_TIME
          make O=out olddefconfig CC=clang LLVM=1 LLVM_IAS=1 2>/dev/null

          echo "=== Key configs ==="
          for cfg in CONFIG_KSU CONFIG_BBG CONFIG_NTSYNC CONFIG_HZ CONFIG_LTO_CLANG_THIN CONFIG_OVERLAY_FS CONFIG_SECCOMP CONFIG_NAMESPACES CONFIG_WIREGUARD CONFIG_AUTOFDO_CLANG; do
            grep -q "^${cfg}=y\|^${cfg}=[0-9]" out/.config && echo "  $cfg=$(grep "^${cfg}=" out/.config | cut -d= -f2)" || echo "  $cfg=NOT SET"
          done

      - name: Build kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export CCACHE_DIR="$PWD/.ccache"

          JOBS=$(nproc --all 2>/dev/null || echo 16)
          make -j"$JOBS" O=out CC="ccache clang" LLVM=1 LLVM_IAS=1 KCFLAGS="-w" 2>&1 | tee build.log

          if [ -f "out/arch/arm64/boot/Image" ]; then
            echo "Build SUCCESSFUL"
            strings out/arch/arm64/boot/Image | grep 'Linux version' | head -1
          else
            echo "Build FAILED"
            tail -60 build.log
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          TEMP_DIR="anykernel_temp"
          rm -rf "$TEMP_DIR"
          cp -r anykernel "$TEMP_DIR"

          ZIMAGE_DIR="out/arch/arm64/boot"
          if [ -f "$ZIMAGE_DIR/Image.gz-dtb" ]; then
            cp -v "$ZIMAGE_DIR/Image.gz-dtb" "$TEMP_DIR/"
          elif [ -f "$ZIMAGE_DIR/Image.gz" ]; then
            cp -v "$ZIMAGE_DIR/Image.gz" "$TEMP_DIR/"
          elif [ -f "$ZIMAGE_DIR/Image" ]; then
            cp -v "$ZIMAGE_DIR/Image" "$TEMP_DIR/"
          fi

          if [ -d "$ZIMAGE_DIR/dts/vendor/qcom" ]; then
            mkdir -p "$TEMP_DIR/dtb"
            cp -v "$ZIMAGE_DIR"/dts/vendor/qcom/*.dtb "$TEMP_DIR/dtb/" 2>/dev/null || true
            cp -v "$ZIMAGE_DIR"/dts/vendor/qcom/*.dtbo "$TEMP_DIR/dtb/" 2>/dev/null || true
          fi

          VERSION="${{ inputs.version != '' && inputs.version || github.run_number }}"
          ZIP_NAME="Capybara-Kernel-v${VERSION}-$(date +%Y%m%d).zip"

          cd "$TEMP_DIR"
          zip -r9 "../$ZIP_NAME" ./*
          cd ..

          rm -rf "$TEMP_DIR"
          echo "ZIP_PATH=$PWD/$ZIP_NAME" >> $GITHUB_ENV
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "Package: $ZIP_NAME ($(du -h "$ZIP_NAME" | cut -f1))"

      - name: Upload kernel package
        uses: actions/upload-artifact@v7
        with:
          name: Capybara-Kernel
          path: ${{ env.ZIP_PATH }}
          archive: false
          if-no-files-found: error

      - name: Build summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Build Complete

          | Item | Value |
          |------|-------|
          | **Kernel** | 6.6.77 Capybara CLO |
          | **Clang** | ${{ env.CLANG_VERSION }} |
          | **HZ** | 300 |
          | **LTO** | ThinLTO |
          | **ReSukiSU** | ${{ inputs.ksu_branch != '' && inputs.ksu_branch || 'main' }} |
          | **SUSFS** | ${{ inputs.enable_susfs == true && 'enabled' || 'disabled' }} |
          | **BBG** | built-in |
          | **AutoFDO** | enabled (GKI profile) |
          | **Artifact** | ${{ env.ZIP_NAME }} |
          EOF
